<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Lip-Sync Widget</title>
    <style>
        :root { --primary: #4f46e5; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; padding: 10px; }
        .widget-card { background: white; width: 100%; max-width: 450px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 20px; box-sizing: border-box; }
        h2 { font-size: 1.2rem; color: #1e293b; margin-top: 0; text-align: center; }
        
        .upload-area { border: 2px dashed #cbd5e1; padding: 15px; border-radius: 10px; text-align: center; cursor: pointer; transition: 0.3s; margin-bottom: 15px; }
        .upload-area:hover { border-color: var(--primary); background: #f1f5f9; }
        #imagePreview { max-width: 100%; max-height: 150px; border-radius: 8px; display: none; margin: 10px auto; }

        textarea { width: 100%; height: 80px; padding: 12px; border: 1px solid #ddd; border-radius: 8px; resize: none; box-sizing: border-box; font-size: 14px; margin-bottom: 15px; }
        
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-generate { background: var(--primary); color: white; margin-bottom: 10px; }
        .btn-generate:disabled { background: #94a3b8; }
        .btn-download { background: #10b981; color: white; display: none; text-decoration: none; text-align: center; font-size: 14px; }

        .loader { display: none; text-align: center; font-size: 13px; color: #64748b; margin: 10px 0; }
        video { width: 100%; border-radius: 10px; margin-top: 15px; background: #000; display: none; }
    </style>
</head>
<body>

<div class="widget-card">
    <h2>Tạo Video Nhép Miệng AI</h2>
    
    <div class="upload-area" onclick="document.getElementById('imageInput').click()">
        <span id="uploadText">Bấm để tải ảnh khuôn mặt</span>
        <input type="file" id="imageInput" accept="image/*" hidden onchange="previewImage(event)">
        <img id="imagePreview" src="">
    </div>

    <textarea id="textInput" placeholder="Nhập nội dung muốn nhân vật nói..."></textarea>

    <button id="submitBtn" class="btn-generate" onclick="generateVideo()">Bắt đầu tạo Video</button>
    
    <div id="loader" class="loader">⚙️ AI đang xử lý (khoảng 1-2 phút)...</div>

    <video id="resultVideo" controls></video>
    <a id="downloadBtn" class="btn-download" download="ai-video.mp4">Tải Video về máy</a>
</div>

<script>
    function previewImage(event) {
        const reader = new FileReader();
        reader.onload = function(){
            const output = document.getElementById('imagePreview');
            output.src = reader.result;
            output.style.display = 'block';
            document.getElementById('uploadText').style.display = 'none';
        };
        reader.readAsDataURL(event.target.files[0]);
    }

    async function generateVideo() {
        const imageFile = document.getElementById('imageInput').files[0];
        const text = document.getElementById('textInput').value;
        const btn = document.getElementById('submitBtn');
        const loader = document.getElementById('loader');
        const video = document.getElementById('resultVideo');
        const downloadBtn = document.getElementById('downloadBtn');

        if(!imageFile || !text) return alert("Vui lòng chọn ảnh và nhập nội dung!");

        const formData = new FormData();
        formData.append('image', imageFile);
        formData.append('text', text);

        btn.disabled = true;
        loader.style.display = 'block';
        video.style.display = 'none';
        downloadBtn.style.display = 'none';

        try {
            const response = await fetch('/generate-video', { method: 'POST', body: formData });
            const result = await response.json();

            if(result.success) {
                video.src = result.videoUrl;
                video.style.display = 'block';
                downloadBtn.href = result.videoUrl;
                downloadBtn.style.display = 'block';
                loader.style.display = 'none';
            } else {
                alert("Lỗi: " + result.error);
                loader.style.display = 'none';
            }
        } catch (e) {
            alert("Không thể kết nối server.");
            loader.style.display = 'none';
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
